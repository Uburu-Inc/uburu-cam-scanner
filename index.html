<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Document Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <style>
        #video, #canvas {
            width: 100%;
            max-width: 400px;
            border: 1px solid #ddd;
        }

        #controls {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Web Document Scanner</h1>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="controls">
    <button onclick="turnOnCamera()">Turn On Camera</button>
    <button onclick="turnOffCamera()">Turn Off Camera</button>
    <button onclick="captureImage()">Capture</button>
    <button onclick="downloadPDF()">Download as PDF</button>
</div>

<script src="uburu-cam-scanner-script.js"></script>
</body>
</html>
