<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uburu Web Document Scanner</title>
    <link rel="stylesheet" href="uburu-cam-scanner-style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
</head>
<body>

<h1>Web Document Scanner</h1>
<video id="uburu-video" autoplay playsinline></video>
<canvas id="uburu-canvas"></canvas>

<div id="uburu-doc-logs"></div>

<div id="uburu-controls">
    <button onclick="turnOnUburuScanCamera()">Turn On Camera</button>
    <button onclick="turnOffUburuScanCamera()">Turn Off Camera</button>
    <button onclick="captureUburuScanImage()">Capture</button>
    <button onclick="downloadUburuScamPDF()">Download as PDF</button>
</div>

<script src="uburu-cam-scanner-script.js"></script>
</body>
</html>
